<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ShadowChat — Premium Private Space</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-glow blue"></div>
    <div class="bg-glow purple"></div>

    <!-- Toggle Button for Mobile View -->
    <button class="mobile-menu-btn" id="menu-toggle" aria-label="Toggle Menu">
        <span></span>
        <span></span>
        <span></span>
    </button>

    <div class="app-container">
        <!-- Sidebar (Slides out on mobile) -->
        <aside class="sidebar" id="sidebar">
            <div class="logo">
                <span class="logo-icon">⚡</span>
                <span class="logo-text">Shadow<span class="highlight">Chat</span></span>
            </div>
            
            <div class="section-title">Online Crew</div>
            <div class="online-users" id="user-list">
                <!-- Loaded dynamically -->
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="chat-area">
            <header class="chat-header">
                <div class="room-info">
                    <h3>Everyone, can see! Feel free to use!</h3>
                    <p class="subtitle">Securely encrypted & hardware optimized</p>
                </div>
            </header>

            <div class="messages-container" id="chat-box">
                <!-- Messages load here -->
            </div>

            <footer class="input-container">
                <form class="input-area" id="message-form">
                    <button type="button" class="action-btn" id="emoji-trigger" title="Add Emoji">😊</button>
                    <input type="text" id="msg-input" placeholder="Type an encrypted message..." autocomplete="off">
                    <button type="submit" class="send-btn">
                        <span>Send</span>
                        <svg class="send-icon" viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2.5" fill="none">
                            <line x1="22" y1="2" x2="11" y2="13"></line>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                    </button>
                </form>
            </footer>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
</body>
</html>
